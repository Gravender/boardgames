services:
  app:
    image: mcr.microsoft.com/devcontainers/javascript-node:1-22-bookworm
    command: sleep infinity
    init: true
    user: node
    working_dir: /workspace
    environment:
      POSTGRES_URL: postgresql://postgres:password@postgres:5432/games
      PNPM_STORE_PATH: /home/node/.pnpm-store
    volumes:
      - pnpm-store-cache:/home/node/.pnpm-store
    depends_on:
      postgres:
        condition: service_healthy

  playwright:
    image: mcr.microsoft.com/playwright:v1.53.1-noble
    command:
      - /bin/bash
      - -lc
      - corepack enable && corepack prepare pnpm@10.15.1 --activate && sleep infinity
    init: true
    working_dir: /workspace
    ipc: host
    environment:
      PLAYWRIGHT_BASE_URL: http://localhost:3000
      POSTGRES_URL: postgresql://postgres:password@postgres:5432/games
      PNPM_STORE_PATH: /home/pwuser/.pnpm-store
    volumes:
      - ..:/workspace:cached
      - pnpm-store-cache:/home/pwuser/.pnpm-store
    ports:
      - "9323:9323"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: games
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d games"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - games-postgres-data:/var/lib/postgresql/data

  pgweb:
    image: sosedoff/pgweb
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: postgres://postgres:password@postgres:5432/games?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  games-postgres-data:
    name: board-games-postgres-data
  pnpm-store-cache:
    name: board-games-pnpm-store-cache
